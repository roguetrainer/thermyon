title: Hot Logiq — Raven ISA and HPU Programming Model
description: Five opcodes. One framework. Every scale of nature.
url: "https://hotlogiq.ca"
baseurl: ""

remote_theme: just-the-docs/just-the-docs@v0.10.0

# ── Site identity ─────────────────────────────────────────────────────────────
author: Ian R. C. Buckley

# ── Just-the-docs settings ────────────────────────────────────────────────────
color_scheme: light

logo: "/assets/images/asa-logo.png"
favicon_ico: "/assets/images/asa-logo.png"

custom_domain: hotlogiq.ca

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Sidebar nav order: pages use nav_order in frontmatter
nav_sort: order          # respect nav_order field

# ── Collections: one per portfolio ────────────────────────────────────────────
# We keep papers as plain markdown pages — Jekyll renders any .md with frontmatter
exclude:
  - code/
  - "*.tex"
  - "*.bib"
  - "*.py"
  - "*.log"
  - "*.aux"
  - Gemfile
  - Gemfile.lock

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# ── Markdown ──────────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  math_engine: mathjax
  input: GFM
