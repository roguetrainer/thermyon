title: Adelic Simplicial Architecture
description: Five opcodes. Every physical scale. Classical, statistical, and quantum computation from a single algebraic framework.
url: "https://roguetrainer.github.io"
baseurl: "/adelic-simplicial-architecture"

remote_theme: just-the-docs/just-the-docs@v0.10.0

# ── Site identity ─────────────────────────────────────────────────────────────
author: Ian R. C. Buckley

# ── Just-the-docs settings ────────────────────────────────────────────────────
color_scheme: light

logo: "/assets/images/asa-logo.png"
favicon_ico: "/assets/images/asa-logo.png"

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Sidebar nav order: pages use nav_order in frontmatter
nav_sort: order          # respect nav_order field

# ── Collections: one per portfolio ────────────────────────────────────────────
# We keep papers as plain markdown pages — Jekyll renders any .md with frontmatter
exclude:
  - code/
  - "*.tex"
  - "*.bib"
  - "*.py"
  - "*.log"
  - "*.aux"
  - Gemfile
  - Gemfile.lock

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# ── Markdown ──────────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  math_engine: mathjax
